<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>导航 · RunApp</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --sub: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2ff 0%, #f3f4f6 60%, #fdf4ff 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            max-width: 1120px;
            margin: 0 auto;
            /* 避开刘海/打孔屏 (APP/全面屏需要), 桌面浏览器 env() 为 0 不影响 */
            padding-top: env(safe-area-inset-top, 0);
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 6px;
            letter-spacing: .02em;
        }

        .header p {
            color: var(--sub);
            font-size: 14px;
        }

        .search-row {
            margin: 18px auto 24px;
            max-width: 520px;
            display: flex;
            gap: 8px;
        }

        .search-row input {
            flex: 1;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 999px;
            padding: 11px 18px;
            font-size: 15px;
            outline: none;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
            transition: border-color .15s, box-shadow .15s;
        }

        .search-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .15);
        }

        .sections {
            display: grid;
            grid-template-columns: 1fr;
            gap: 26px;
            align-items: start;
        }

        .section-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .section-title h2 {
            font-size: 18px;
            line-height: 1.3;
            color: var(--text);
        }

        .section-count {
            flex: 0 0 auto;
            color: var(--sub);
            font-size: 12px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .section[data-group="other"] .section-grid {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .nav-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
            transition: transform .15s, box-shadow .2s, border-color .15s;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent, var(--primary));
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }

        .nav-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
            border-color: transparent;
        }

        .nav-card:active {
            transform: translateY(0);
        }

        .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            background: var(--accent, var(--primary));
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .desc {
            font-size: 13px;
            color: var(--sub);
            line-height: 1.45;
        }

        .filename {
            margin-top: auto;
            font-size: 11px;
            color: var(--sub);
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            background: #f9fafb;
            padding: 3px 8px;
            border-radius: 4px;
            align-self: flex-start;
            border: 1px solid var(--border);
        }

        .empty {
            text-align: center;
            color: var(--sub);
            padding: 40px;
            font-size: 14px;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            color: var(--sub);
            font-size: 12px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 10px;
            }

            .header h1 {
                font-size: 22px;
            }

            .sections {
                gap: 20px;
            }

            .section-grid,
            .section[data-group="other"] .section-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .nav-card {
                padding: 14px;
                border-radius: 14px;
                gap: 8px;
            }

            .icon {
                width: 38px;
                height: 38px;
                font-size: 19px;
                border-radius: 10px;
            }

            .title {
                font-size: 14px;
            }

            .desc {
                font-size: 12px;
            }

            .filename {
                font-size: 10px;
            }
        }

        @media (max-width: 380px) {
            .section-grid,
            .section[data-group="other"] .section-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚀 RunApp 导航</h1>
            <p>本目录下所有工具与小页面</p>
        </div>

        <div class="search-row">
            <input id="search" type="search" placeholder="搜索页面..." oninput="renderCards()">
        </div>

        <div class="sections" id="sections"></div>

        <div class="footer">
            <span id="count"></span>
        </div>
    </div>

    <script>
        // 页面列表 - 新增页面时在此添加即可
        const PAGES = [
            {
                file: 'sina-link-list.html',
                title: '新浪账号链接列表',
                desc: '提取新浪微博正文跳转链接，支持打开原文与摘要朗读',
                icon: '📰',
                color: '#e34b4b',
                group: 'other',
            },
            {
                file: 'qinglong.html',
                title: '青龙面板管理器',
                desc: '远程管理青龙面板的定时任务和环境变量, 支持 WebDAV 同步凭证',
                icon: '🐉',
                color: '#10b981',
                group: 'other',
            },
            {
                file: 'mysend.html',
                title: '消息推送助手',
                desc: '快速发送消息通知',
                icon: '📨',
                color: '#4f46e5',
                group: 'other',
            },
            {
                file: '打开日志.html',
                title: '打开游戏日志',
                desc: '深度链接 / 唤起 App 查看日志',
                icon: '📜',
                color: '#f59e0b',
                group: 'company',
            },
            {
                file: 'gala深度链接.html',
                title: 'Gala 深度链接',
                desc: '生成并打开 Gala 相关的 deeplink',
                icon: '🎮',
                color: '#ec4899',
                group: 'company',
            },
            {
                file: 'depplink测试.html',
                title: '广告 Deeplink 测试台',
                desc: '按项目和渠道整理广告落地链接拉起测试入口',
                icon: '🔗',
                color: '#0f766e',
                group: 'company',
            },
            {
                file: '计算中信卡消费静态网页.html',
                title: '中信卡消费计算',
                desc: '解析账单文件, 统计与计算消费金额',
                icon: '💳',
                color: '#3b82f6',
                group: 'other',
            },
        ];

        const GROUPS = [
            { key: 'company', title: '公司相关' },
            { key: 'other', title: '其他工具' },
        ];

        function $(id) { return document.getElementById(id); }

        function renderCards() {
            const kw = $('search').value.trim().toLowerCase();
            const list = PAGES.filter(p => {
                if (!kw) return true;
                return p.title.toLowerCase().includes(kw)
                    || p.desc.toLowerCase().includes(kw)
                    || p.file.toLowerCase().includes(kw);
            });
            const sections = $('sections');
            if (list.length === 0) {
                sections.innerHTML = '<div class="empty" style="grid-column:1/-1">没有匹配的页面</div>';
            } else {
                sections.innerHTML = GROUPS.map(group => {
                    const groupPages = list.filter(p => p.group === group.key);
                    if (groupPages.length === 0) return '';

                    return `
                        <section class="section" data-group="${group.key}">
                            <div class="section-title">
                                <h2>${group.title}</h2>
                                <span class="section-count">${groupPages.length} 个</span>
                            </div>
                            <div class="section-grid">
                                ${groupPages.map(p => `
                                    <a class="nav-card" href="${encodeURI(p.file)}" style="--accent:${p.color}">
                                        <div class="icon">${p.icon}</div>
                                        <div class="title">${p.title}</div>
                                        <div class="desc">${p.desc}</div>
                                        <span class="filename">${p.file}</span>
                                    </a>
                                `).join('')}
                            </div>
                        </section>
                    `;
                }).join('');
            }
            $('count').textContent = `共 ${PAGES.length} 个页面${kw ? `, 匹配 ${list.length} 个` : ''}`;
        }

        renderCards();
    </script>
</body>

</html>
