<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Deeplink 测试</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #172033;
            --sub: #657085;
            --border: #dce2ea;
            --soccer: #0f766e;
            --club: #b45309;
            --code: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background: var(--bg);
            padding: 24px 14px;
            -webkit-text-size-adjust: 100%;
        }

        .page {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding-top: env(safe-area-inset-top, 0);
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }

        header {
            margin-bottom: 18px;
        }

        h1 {
            font-size: 28px;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .hint {
            color: var(--sub);
            font-size: 14px;
            line-height: 1.6;
        }

        .list {
            display: grid;
            gap: 14px;
        }

        .item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(23, 32, 51, 0.06);
        }

        .item-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 18px;
            line-height: 1.3;
        }

        .tag {
            flex: 0 0 auto;
            color: #fff;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            background: var(--accent);
        }

        .open-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 50px;
            margin: 12px 0;
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            background: var(--accent);
            transition: filter .15s, transform .15s;
        }

        .open-link:hover {
            filter: brightness(0.94);
        }

        .open-link:active {
            transform: translateY(1px);
        }

        .label {
            color: var(--sub);
            font-size: 12px;
            margin: 10px 0 6px;
        }

        code,
        pre {
            font-family: ui-monospace, "Cascadia Code", Consolas, "Liberation Mono", monospace;
        }

        .scheme {
            overflow-wrap: anywhere;
            color: var(--code);
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            line-height: 1.45;
        }

        pre {
            overflow-x: auto;
            white-space: pre-wrap;
            color: #e5e7eb;
            background: #111827;
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            min-height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: max(20px, env(safe-area-inset-bottom, 0));
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            color: #fff;
            background: rgba(17, 24, 39, .92);
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 13px;
            transition: opacity .18s, transform .18s;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -6px);
        }

        @media (max-width: 560px) {
            body {
                padding: 18px 10px;
            }

            h1 {
                font-size: 23px;
            }

            .item {
                padding: 14px;
            }

            .item-head {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header>
            <h1>公司内部 Deeplink 测试</h1>
            <p class="hint">在已安装对应 Android 包的设备浏览器中点击按钮，可以直接拉起目标应用页面。</p>
        </header>

        <section class="list" id="appList"></section>
    </main>

    <div class="toast" id="toast">已复制</div>

    <script>
        const LINKS = [
            {
                name: '新足',
                tag: '7daycheckin',
                color: '#0f766e',
                url: 'platformsdk-com.galasports.championsfc.huawei://page/7daycheckin',
                adb: 'adb shell am start -W -a android.intent.action.VIEW -c android.intent.category.BROWSABLE -d "platformsdk-com.galasports.championsfc.huawei://page/7daycheckin"',
            },
            {
                name: '球会',
                tag: 'worldcup',
                color: '#b45309',
                url: 'platformsdk-com.galasports.totalfootball.a.huawei://page/worldcup?log_switch=true',
                adb: 'adb shell am start -W -a android.intent.action.VIEW -c android.intent.category.BROWSABLE -d "platformsdk-com.galasports.totalfootball.a.huawei://page/worldcup?log_switch=true"',
            },
        ];

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, function (char) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;',
                }[char];
            });
        }

        function render() {
            document.getElementById('appList').innerHTML = LINKS.map(function (item, index) {
                return `
                    <article class="item" style="--accent:${item.color}">
                        <div class="item-head">
                            <h2>${escapeHtml(item.name)}</h2>
                            <span class="tag">${escapeHtml(item.tag)}</span>
                        </div>
                        <a class="open-link" href="${item.url}" data-index="${index}">点击拉起${escapeHtml(item.name)}</a>
                        <div class="label">Deeplink</div>
                        <div class="scheme">${escapeHtml(item.url)}</div>
                        <div class="label">ADB 命令</div>
                        <pre>${escapeHtml(item.adb)}</pre>
                        <div class="actions">
                            <button type="button" onclick="copyText(${index}, 'url')">复制 Deeplink</button>
                            <button type="button" onclick="copyText(${index}, 'adb')">复制 ADB 命令</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function copyText(index, key) {
            const text = LINKS[index][key];
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showToast, fallbackCopy.bind(null, text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(function () {
                toast.classList.remove('show');
            }, 1500);
        }

        render();
    </script>
</body>
</html>
