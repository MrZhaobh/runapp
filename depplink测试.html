<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>广告 Deeplink 测试台</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #111827;
            --muted: #5b6b82;
            --border: #d8e1ed;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --amber: #b45309;
            --blue: #2563eb;
            --code-bg: #111827;
            --shadow: 0 12px 28px rgba(17, 24, 39, .08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100dvh;
            color: var(--text);
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            padding: 22px 14px 28px;
            -webkit-text-size-adjust: 100%;
        }

        .page {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            padding-top: env(safe-area-inset-top, 0);
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 18px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            margin-bottom: 12px;
            padding: 0 10px;
            border-radius: 999px;
            color: var(--primary-dark);
            background: #dff5ef;
            font-size: 13px;
            font-weight: 800;
        }

        h1 {
            font-size: 34px;
            line-height: 1.15;
            letter-spacing: 0;
            margin-bottom: 0;
        }

        .status {
            display: grid;
            grid-template-columns: repeat(2, minmax(112px, 1fr));
            gap: 10px;
            min-width: 260px;
        }

        .stat {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            padding: 12px;
            box-shadow: 0 6px 16px rgba(17, 24, 39, .05);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.1;
        }

        .stat-label {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 18px 0 14px;
        }

        .toolbar h2 {
            font-size: 22px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
        }

        .tab {
            min-height: 56px;
            min-width: 124px;
            padding: 0 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            background: var(--surface);
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 6px 16px rgba(17, 24, 39, .05);
        }

        .tab:hover,
        .tab:focus-visible {
            border-color: var(--primary);
            color: var(--primary-dark);
            outline: none;
        }

        .tab.active {
            color: #fff;
            border-color: var(--primary);
            background: var(--primary);
        }

        .projects {
            display: block;
        }

        .project {
            min-width: 0;
        }

        .project-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            padding: 0 2px;
        }

        .project-name {
            font-size: 44px;
            line-height: 1.15;
            font-weight: 900;
        }

        .project-count {
            flex: 0 0 auto;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .entry-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
        }

        .link-card {
            min-width: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 18px;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .channel {
            color: var(--accent);
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .target {
            font-size: 22px;
            line-height: 1.25;
        }

        .badge {
            flex: 0 0 auto;
            max-width: 46%;
            color: #fff;
            background: var(--accent);
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .desc {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 14px;
        }

        .open-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 54px;
            border-radius: 6px;
            color: #fff;
            background: var(--accent);
            text-decoration: none;
            font-size: 17px;
            font-weight: 900;
            touch-action: manipulation;
            transition: filter .15s, transform .15s;
        }

        .open-link:hover {
            filter: brightness(.94);
        }

        .open-link:active {
            transform: translateY(1px);
        }

        .meta {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        code,
        pre {
            font-family: ui-monospace, "Cascadia Code", Consolas, "Liberation Mono", monospace;
        }

        .scheme {
            color: #263449;
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            overflow-wrap: anywhere;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .copy-btn {
            min-height: 38px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .copy-btn:hover,
        .copy-btn:focus-visible {
            border-color: var(--accent);
            color: var(--accent);
            outline: none;
        }

        details {
            margin-top: 12px;
        }

        summary {
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
        }

        pre {
            overflow-x: auto;
            white-space: pre-wrap;
            color: #e5e7eb;
            background: var(--code-bg);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.55;
        }

        .empty {
            grid-column: 1 / -1;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--muted);
            background: rgba(255, 255, 255, .7);
            padding: 28px;
            text-align: center;
            font-size: 14px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: max(20px, env(safe-area-inset-bottom, 0));
            z-index: 10;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            color: #fff;
            background: rgba(17, 24, 39, .94);
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            transition: opacity .18s, transform .18s;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -6px);
        }

        @media (max-width: 920px) {
            .topbar {
                display: block;
            }

            .status {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                min-width: 0;
                margin-top: 14px;
            }

            .toolbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .tabs {
                justify-content: flex-start;
                width: 100%;
            }

            .projects {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 14px 10px 22px;
            }

            h1 {
                font-size: 28px;
            }

            .status {
                gap: 8px;
            }

            .stat {
                padding: 10px;
            }

            .stat-value {
                font-size: 22px;
            }

            .project-head,
            .card-top {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .project-name {
                font-size: 40px;
            }

            .tab {
                flex: 1 1 132px;
                min-width: 0;
                font-size: 21px;
            }

            .badge {
                max-width: 100%;
            }

            .link-card {
                padding: 16px;
            }

            .open-link {
                min-height: 58px;
            }

            .actions .copy-btn {
                flex: 1 1 132px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <div>
                <div class="eyebrow">内部测试工具</div>
                <h1>广告 Deeplink 测试台</h1>
            </div>

            <div class="status" aria-label="当前测试入口统计">
                <div class="stat">
                    <div class="stat-value" id="projectCount">0</div>
                    <div class="stat-label">项目</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="entryCount">0</div>
                    <div class="stat-label">当前入口</div>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <h2>选择项目</h2>
            <nav class="tabs" id="projectTabs" aria-label="项目导航"></nav>
        </div>

        <section class="projects" id="projectList"></section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">已复制</div>

    <script>
        const LINKS = [
            {
                project: '新足',
                channel: '华为',
                channelLabel: '华为广告',
                activity: '单活动',
                target: '7 日签到页',
                badge: '7daycheckin',
                desc: '验证华为广告点击后，是否能拉起新足华为渠道包并进入 7 日签到落地页。',
                color: '#0f766e',
                url: 'platformsdk-com.galasports.championsfc.huawei://page/7daycheckin',
            },
            {
                project: '球会',
                channel: '华为',
                channelLabel: '华为广告',
                activity: '单活动',
                target: '世界杯活动页',
                badge: 'worldcup',
                desc: '验证华为广告点击后，是否能拉起球会华为渠道包，并携带 log_switch=true 进入世界杯落地页。',
                color: '#b45309',
                url: 'platformsdk-com.galasports.totalfootball.a.huawei://page/worldcup?log_switch=true',
            },
        ];

        let currentProject = LINKS[0].project;

        function escapeHtml(text) {
            return String(text).replace(/[&<>"']/g, function (char) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;',
                }[char];
            });
        }

        function toAdbCommand(url) {
            return 'adb shell am start -W -a android.intent.action.VIEW -c android.intent.category.BROWSABLE -d "' + url + '"';
        }

        function getProjects() {
            return Array.from(new Set(LINKS.map(function (item) {
                return item.project;
            })));
        }

        function getCurrentEntries() {
            return LINKS.map(function (item, index) {
                return { item: item, index: index };
            }).filter(function (entry) {
                return entry.item.project === currentProject;
            });
        }

        function renderProjectTabs() {
            document.getElementById('projectTabs').innerHTML = getProjects().map(function (project) {
                const active = project === currentProject ? ' active' : '';
                return '<button class="tab' + active + '" type="button" data-project="' + escapeHtml(project) + '">' + escapeHtml(project) + '</button>';
            }).join('');

            document.querySelectorAll('#projectTabs .tab').forEach(function (button) {
                button.addEventListener('click', function () {
                    setProject(button.dataset.project);
                });
            });
        }

        function renderProjectPage() {
            const entries = getCurrentEntries();
            const projects = getProjects();

            document.getElementById('projectCount').textContent = projects.length;
            document.getElementById('entryCount').textContent = entries.length;

            if (entries.length === 0) {
                document.getElementById('projectList').innerHTML = '<div class="empty">当前筛选下没有测试入口</div>';
                return;
            }

            document.getElementById('projectList').innerHTML = `
                <section class="project" aria-label="${escapeHtml(currentProject)}">
                    <div class="project-head">
                        <h3 class="project-name">${escapeHtml(currentProject)}</h3>
                        <span class="project-count">${entries.length} 个入口</span>
                    </div>
                    <div class="entry-list">
                        ${entries.map(renderEntry).join('')}
                    </div>
                </section>
            `;
        }

        function renderEntry(entry) {
            const item = entry.item;
            const index = entry.index;
            const adb = toAdbCommand(item.url);

            return `
                <article class="link-card" style="--accent:${item.color}">
                    <div class="card-top">
                        <div>
                            <div class="channel">${escapeHtml(item.channelLabel)} · ${escapeHtml(item.activity)}</div>
                            <h4 class="target">${escapeHtml(item.target)}</h4>
                        </div>
                        <span class="badge">${escapeHtml(item.badge)}</span>
                    </div>
                    <p class="desc">${escapeHtml(item.desc)}</p>
                    <a class="open-link" href="${item.url}" aria-label="拉起${escapeHtml(item.project)}${escapeHtml(item.target)}">手机点击拉起</a>
                    <div class="meta">
                        <div class="label">Deeplink</div>
                        <div class="scheme">${escapeHtml(item.url)}</div>
                    </div>
                    <div class="actions">
                        <button class="copy-btn" type="button" onclick="copyText(${index}, 'url')">复制 Deeplink</button>
                        <button class="copy-btn" type="button" onclick="copyText(${index}, 'adb')">复制 ADB 备用命令</button>
                    </div>
                    <details>
                        <summary>查看 ADB 备用调试命令</summary>
                        <pre>${escapeHtml(adb)}</pre>
                    </details>
                </article>
            `;
        }

        function setProject(project) {
            currentProject = project;
            render();
        }

        function copyText(index, key) {
            const item = LINKS[index];
            const text = key === 'adb' ? toAdbCommand(item.url) : item.url;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showToast, fallbackCopy.bind(null, text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(function () {
                toast.classList.remove('show');
            }, 1500);
        }

        function render() {
            renderProjectTabs();
            renderProjectPage();
        }

        render();
    </script>
</body>
</html>
